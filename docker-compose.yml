version: '3.8'

services:
  backend:
    build: ./backend
    container_name: worldstay-backend
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - NODE_ENV=production
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: worldstay-frontend
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:4000
    depends_on:
      - backend
    restart: unless-stopped
